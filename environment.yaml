# Conda environment for the Visual Analytics resit pipeline.
# Create: conda env create -f environment.yaml
# Note: pymc is pip-installed; NUTS sampling uses nutpie (Rust/numba backend),
# so no C++ toolchain (g++) is required in the env.
name: va-resit
channels:
  - defaults
  - anaconda
  - conda-forge
dependencies:
  - python=3.11
  - numpy==2.4.6
  - pandas==3.0.3
  - scipy==1.17.1
  - scikit-learn==1.9.0
  - matplotlib==3.11.0
  - seaborn==0.13.2
  - plotly==6.8.0
  - pytensor==2.25.5
  - pymc==5.28.5
  - arviz==0.23.4
  - nutpie==0.16.8
  - requests==2.34.2
  - jupyter
  